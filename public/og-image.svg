    <line x1="2" y1="12" x2="22" y2="12" stroke="#3b82f6" stroke-width="1.5"/>
    <path d="M4.5 7.5 Q12 9 19.5 7.5" stroke="#3b82f6" stroke-width="1.2" fill="none"/>
