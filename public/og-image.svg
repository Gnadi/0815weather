      <stop offset="0%" stop-color="#0d1f4a"/>
      <stop offset="60%" stop-color="#080d1a"/>
    </radialGradient>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Globe icon -->
  <g transform="translate(140,215) scale(8.3)">
